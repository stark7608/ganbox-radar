name: GAN BOX Radar — Daily Scan

on:
  schedule:
    - cron: '0 22 * * 0-4'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install -r ganbox-radar/requirements.txt
      - name: 스캔 실행
        working-directory: ganbox-radar
        env:
          FIREBASE_KEY:   ${{ secrets.FIREBASE_KEY }}
          ADMIN_PIN_HASH: ${{ secrets.ADMIN_PIN_HASH }}
        run: python scanner.py
